# =============================================================================
# SE(3)-equivariant flow-matching generator (backbone generation)
# Tuned small for 6 GB VRAM.
# =============================================================================
name: se3_flow_matching

# Backbone representation
# Phase 2 implements `ca` (Cα-coordinate flow matching with an EGNN velocity
# field). `ca_frames` (full SE(3) frames / IPA) is a planned extension.
representation: ca            # ca (implemented) | ca_frames | backbone_atoms
max_residues: 80
crop_length: 64               # fixed-length training crop (<= max_residues)

# EGNN-style equivariant network
hidden_dim: 128
n_layers: 5
edge_dim: 32
n_neighbors: 16                # kNN graph for locality (memory saver)

# Flow matching
sigma_min: 0.001
time_embed_dim: 32
prediction: velocity           # velocity (flow matching) | score
coord_scale: 10.0              # divide Cα Å by this so data ~ unit variance (matches N(0,I) noise)

# Training
batch_size: 4                  # small for 6 GB VRAM
lr: 0.0002
weight_decay: 0.00001
epochs: 200
grad_checkpoint: true
mixed_precision: true          # fp16 autocast
grad_clip: 1.0

# Sampling
n_ode_steps: 100
